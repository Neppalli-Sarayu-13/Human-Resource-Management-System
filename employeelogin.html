<!DOCTYPE html>

<html>
<head>
    <title>HRMS Employee Login</title>
    <link rel="icon" type="image/png" href="../static/images/Srinidhi_associates_logo.jpeg">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .company {
            color: #1e3a8a;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .login-card {
            background: white;
            width: 320px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .login-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        h3 {
            margin-bottom: 20px;
            color: gray;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #1e3a8a;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            margin-bottom: 10px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2563eb;
        }

        a {
            font-size: 14px;
            text-decoration: none;
            color: #2563eb;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <h2 class="company">SRINIDHI ASSOCIATES</h2>
        <h3>Employee Login</h3>
        <form>
            <label for="empid">Employee ID</label>
            <input type="text" id="empid" placeholder="Enter Employee ID" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="employee_forgotpassword.html">Forgot Password?</a>
    </div>
</div>
</body>
</html>
