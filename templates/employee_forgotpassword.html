<!DOCTYPE html>
<html>
<head>
    <title>Employee Forgot Password</title>
    <link rel="icon" type="image/png" href="../static/images/Srinidhi_associates_logo.jpeg">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            width: 320px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        a {
            display: block;
            margin-top: 20px;
            color: #1e3a8a;
            text-decoration: none;
        }

        h2 {
            margin-bottom: 20px;
            color: #1e3a8a;
        }
        
        p{
            color: gray;
            font-size: small;
        }

    </style>
</head>

<body>
    <div class="box">
        <h2>Forgot Password</h2>
        <p>Enter your email to reset password</p>
        <input type="email" placeholder="Enter your email">
        <button>Send Reset Link</button>
        <a href="employeelogin.html">Back to Login</a>
    </div>
</body>
</html>
